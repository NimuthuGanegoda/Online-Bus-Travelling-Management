<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#140B09" />
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#E76F51" text-anchor="middle" font-weight="bold">SL BusTrack - System Architecture</text>
  
  <!-- Clients -->
  <rect x="50" y="80" width="700" height="120" rx="10" fill="none" stroke="#E76F51" stroke-width="2" stroke-dasharray="5,5" />
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="16" fill="#E76F51">Clients (Flutter Apps)</text>
  
  <rect x="100" y="125" width="150" height="50" rx="5" fill="#241714" stroke="#E76F51" stroke-width="2" />
  <text x="175" y="155" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Passenger App</text>
  
  <rect x="325" y="125" width="150" height="50" rx="5" fill="#241714" stroke="#E76F51" stroke-width="2" />
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Driver App</text>
  
  <rect x="550" y="125" width="150" height="50" rx="5" fill="#241714" stroke="#E76F51" stroke-width="2" />
  <text x="625" y="155" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Admin App</text>

  <!-- Infrastructure -->
  <rect x="50" y="230" width="700" height="150" rx="10" fill="none" stroke="#006D77" stroke-width="2" stroke-dasharray="5,5" />
  <text x="60" y="255" font-family="Arial, sans-serif" font-size="16" fill="#006D77">Infrastructure (Supabase)</text>
  
  <rect x="100" y="280" width="120" height="70" rx="5" fill="#08131A" stroke="#006D77" stroke-width="2" />
  <text x="160" y="310" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Auth</text>
  <text x="160" y="330" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(Identity)</text>
  
  <rect x="260" y="280" width="120" height="70" rx="5" fill="#08131A" stroke="#006D77" stroke-width="2" />
  <text x="320" y="310" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Database</text>
  <text x="320" y="330" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(PostgreSQL)</text>
  
  <rect x="420" y="280" width="120" height="70" rx="5" fill="#08131A" stroke="#006D77" stroke-width="2" />
  <text x="480" y="310" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Realtime</text>
  <text x="480" y="330" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(WebSockets)</text>
  
  <rect x="580" y="280" width="120" height="70" rx="5" fill="#08131A" stroke="#006D77" stroke-width="2" />
  <text x="640" y="310" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Functions</text>
  <text x="640" y="330" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(Edge Runtime)</text>

  <!-- Intelligence -->
  <rect x="50" y="410" width="700" height="150" rx="10" fill="none" stroke="#8338EC" stroke-width="2" stroke-dasharray="5,5" />
  <text x="60" y="435" font-family="Arial, sans-serif" font-size="16" fill="#8338EC">Intelligence Layer (Neo)</text>
  
  <rect x="100" y="460" width="180" height="70" rx="5" fill="#1a1a1a" stroke="#8338EC" stroke-width="2" />
  <text x="190" y="490" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">ETA Prediction</text>
  <text x="190" y="510" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(scikit-learn)</text>
  
  <rect x="310" y="460" width="180" height="70" rx="5" fill="#1a1a1a" stroke="#8338EC" stroke-width="2" />
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Driver Rating</text>
  <text x="400" y="510" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(Classification)</text>
  
  <rect x="520" y="460" width="180" height="70" rx="5" fill="#1a1a1a" stroke="#8338EC" stroke-width="2" />
  <text x="610" y="490" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Emergency Triage</text>
  <text x="610" y="510" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">(Prioritization)</text>

  <!-- Connectors -->
  <path d="M175 200 L175 230" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M400 200 L400 230" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M625 200 L625 230" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <path d="M190 380 L190 410" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M400 380 L400 410" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M610 380 L610 410" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
    </marker>
  </defs>
</svg>

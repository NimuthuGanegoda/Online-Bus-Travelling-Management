<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#08131A" />
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#006D77" text-anchor="middle" font-weight="bold">SL BusTrack - Use Case Diagram</text>
  
  <!-- System Boundary -->
  <rect x="250" y="80" width="300" height="480" rx="10" fill="none" stroke="#006D77" stroke-width="2" />
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="16" fill="#006D77" text-anchor="middle">SL BusTrack System</text>
  
  <!-- Actors -->
  <circle cx="100" y="150" r="20" fill="none" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="170" x2="100" y2="210" stroke="#fff" stroke-width="2" />
  <line x1="80" y1="185" x2="120" y2="185" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="210" x2="80" y2="240" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="210" x2="120" y2="240" stroke="#fff" stroke-width="2" />
  <text x="100" y="265" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Passenger</text>

  <circle cx="100" y="400" r="20" fill="none" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="420" x2="100" y2="460" stroke="#fff" stroke-width="2" />
  <line x1="80" y1="435" x2="120" y2="435" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="460" x2="80" y2="490" stroke="#fff" stroke-width="2" />
  <line x1="100" y1="460" x2="120" y2="490" stroke="#fff" stroke-width="2" />
  <text x="100" y="515" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Driver</text>

  <circle cx="700" y="300" r="20" fill="none" stroke="#fff" stroke-width="2" />
  <line x1="700" y1="320" x2="700" y2="360" stroke="#fff" stroke-width="2" />
  <line x1="680" y1="335" x2="720" y2="335" stroke="#fff" stroke-width="2" />
  <line x1="700" y1="360" x2="680" y2="390" stroke="#fff" stroke-width="2" />
  <line x1="700" y1="360" x2="720" y2="390" stroke="#fff" stroke-width="2" />
  <text x="700" y="415" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Admin</text>

  <!-- Use Cases -->
  <ellipse cx="400" y="140" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Login / Register</text>

  <ellipse cx="400" y="200" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="205" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Track Bus Location</text>

  <ellipse cx="400" y="260" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">View Bus ETA</text>

  <ellipse cx="400" y="320" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Rate Driver</text>

  <ellipse cx="400" y="380" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Start / End Trip</text>

  <ellipse cx="400" y="440" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Emergency Alert</text>

  <ellipse cx="400" y="500" rx="100" ry="25" fill="#13232D" stroke="#006D77" stroke-width="1" />
  <text x="400" y="505" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">System Oversight</text>

  <!-- Associations -->
  <line x1="120" y1="150" x2="300" y2="140" stroke="#888" stroke-width="1" />
  <line x1="120" y1="150" x2="300" y2="200" stroke="#888" stroke-width="1" />
  <line x1="120" y1="150" x2="300" y2="260" stroke="#888" stroke-width="1" />
  <line x1="120" y1="150" x2="300" y2="320" stroke="#888" stroke-width="1" />
  <line x1="120" y1="150" x2="300" y2="440" stroke="#888" stroke-width="1" />

  <line x1="120" y1="400" x2="300" y2="140" stroke="#888" stroke-width="1" />
  <line x1="120" y1="400" x2="300" y2="380" stroke="#888" stroke-width="1" />
  <line x1="120" y1="400" x2="300" y2="440" stroke="#888" stroke-width="1" />

  <line x1="680" y1="300" x2="500" y2="140" stroke="#888" stroke-width="1" />
  <line x1="680" y1="300" x2="500" y2="500" stroke="#888" stroke-width="1" />
  <line x1="680" y1="300" x2="500" y2="440" stroke="#888" stroke-width="1" />
</svg>
